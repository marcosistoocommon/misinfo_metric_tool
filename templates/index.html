<!doctype html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ text.page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <div>
          <p class="eyebrow">{{ text.prototype }}</p>
          <h1 class="site-title">{{ text.page_title }}</h1>
        </div>
        <label class="language-switch">
          <span>{{ text.language_label }}</span>
          <select id="language" name="language">
            <option value="en" {% if lang == 'en' %}selected{% endif %}>{{ text.option_en }}</option>
            <option value="es" {% if lang == 'es' %}selected{% endif %}>{{ text.option_es }}</option>
          </select>
        </label>
      </div>
    </header>

    <div class="page-shell">
      <section class="hero-card">
        <h2 class="card-title">{{ text.headline }}</h2>
        <p class="lede">{{ text.lede }}</p>

        {% if backend_error %}
        <div class="backend-alert" role="alert">
          <strong>{{ text.backend_error_label }}:</strong> {{ backend_error }}
        </div>
        {% endif %}

        <form id="analysis-form" class="analysis-form" action="{{ url_for('analyze') }}" method="post" novalidate data-lang="{{ lang }}">
          <input type="hidden" name="lang" id="lang-input" value="{{ lang }}">
          <label class="full-width">
            <span>{{ text.url_label }}</span>
            <input
              type="url"
              name="x_url"
              required
              placeholder="{{ text.url_placeholder }}"
              value="{{ form_values.get('x_url', '') }}"
            >
            <strong id="x-url-error" class="field-error">{{ errors.get('x_url', '') }}</strong>
          </label>

          <button type="submit">{{ text.submit }}</button>
        </form>
      </section>
    </div>

    <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
      <div class="loading-card">
        <h2>{{ text.loading_title }}</h2>
        <p>{{ text.loading_subtitle }}</p>

        <div class="loading-progress" aria-live="polite">
          <div class="loading-progress__meta">
            <span class="loading-progress__phase" id="loading-progress-phase">{{ text.steps[0] }}</span>
            <span class="loading-progress__value" id="loading-progress-value">0%</span>
          </div>
          <div class="loading-progress__track" id="loading-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="{{ text.loading_title }}">
            <div class="loading-progress__fill" id="loading-progress-fill"></div>
          </div>
          <p class="loading-progress__detail" id="loading-progress-detail">{{ text.loading_segments[0][0] }}</p>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById('analysis-form');
      const overlay = document.getElementById('loading-overlay');
      const languageSelect = document.getElementById('language');
      const languageInput = document.getElementById('lang-input');
      const loadingProgressTrack = document.getElementById('loading-progress-track');
      const loadingProgressFill = document.getElementById('loading-progress-fill');
      const loadingProgressPhase = document.getElementById('loading-progress-phase');
      const loadingProgressValue = document.getElementById('loading-progress-value');
      const loadingProgressDetail = document.getElementById('loading-progress-detail');
      const loadingLabels = {{ text.steps | tojson }};
      const loadingSegments = {{ text.loading_segments | tojson }};
      const loadingRanges = [
        { start: 4, end: 55, duration: 120000 },
        { start: 55, end: 70, duration: 25000 },
        { start: 70, end: 80, duration: 18000 },
        { start: 80, end: 90, duration: 14000 },
        { start: 90, end: 97, duration: 9000 },
        { start: 97, end: 100, duration: 6000 },
      ];
      const loadingState = {
        currentStep: 0,
        stepStartedAt: Date.now(),
        displayedPercent: 4,
        done: false,
      };
      let progressTicker = null;
      const errorFields = {
        x_url: document.getElementById('x-url-error'),
      };

      const setLanguage = (language) => {
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('lang', language);
        window.location.href = currentUrl.toString();
      };

      languageSelect.addEventListener('change', () => {
        setLanguage(languageSelect.value);
      });

      const clearErrors = () => {
        Object.values(errorFields).forEach((element) => {
          element.textContent = '';
        });
      };

      const getCurrentRange = () => loadingRanges[Math.min(loadingState.currentStep, loadingRanges.length - 1)];

      const getActiveSegment = () => {
        const segments = loadingSegments[loadingState.currentStep] || [];
        if (!segments.length) {
          return '';
        }

        const range = getCurrentRange();
        const elapsed = Date.now() - loadingState.stepStartedAt;
        const ratio = Math.min(0.999, elapsed / range.duration);
        const segmentIndex = Math.min(segments.length - 1, Math.floor(ratio * segments.length));
        return segments[segmentIndex];
      };

      const renderLoadingProgress = () => {
        const range = getCurrentRange();
        const elapsed = Date.now() - loadingState.stepStartedAt;
        const ratio = loadingState.done ? 1 : Math.min(1, elapsed / range.duration);
        const targetPercent = loadingState.done ? 100 : range.start + ((range.end - range.start) * ratio);

        loadingState.displayedPercent += (targetPercent - loadingState.displayedPercent) * 0.12;
        if (loadingState.done) {
          loadingState.displayedPercent = 100;
        }

        const percent = Math.max(0, Math.min(100, loadingState.displayedPercent));
        const roundedPercent = Math.round(percent);

        loadingProgressFill.style.width = `${percent}%`;
        loadingProgressTrack.setAttribute('aria-valuenow', String(roundedPercent));
        loadingProgressValue.textContent = `${roundedPercent}%`;
        loadingProgressPhase.textContent = loadingLabels[loadingState.currentStep] || loadingLabels[loadingLabels.length - 1];
        loadingProgressDetail.textContent = getActiveSegment() || loadingLabels[loadingState.currentStep] || '';
      };

      const showLoadingProgress = (index, done = false) => {
        if (index !== loadingState.currentStep) {
          loadingState.currentStep = index;
          loadingState.stepStartedAt = Date.now();
        }

        loadingState.done = done;
        renderLoadingProgress();
      };

      const startProgressTicker = () => {
        if (!progressTicker) {
          progressTicker = window.setInterval(renderLoadingProgress, 120);
        }
      };

      const stopProgressTicker = () => {
        if (progressTicker) {
          window.clearInterval(progressTicker);
          progressTicker = null;
        }
      };

      const sleep = (duration) => new Promise((resolve) => window.setTimeout(resolve, duration));

      const pollProgress = async (statusUrl) => {
        while (true) {
          const response = await fetch(statusUrl, { cache: 'no-store' });
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || 'Unable to read analysis progress.');
          }

          if (payload.error) {
            throw new Error(payload.error);
          }

          showLoadingProgress(payload.current_step, payload.done);

          if (payload.done) {
            stopProgressTicker();
            window.location.href = payload.redirect;
            return;
          }

          await sleep(350);
        }
      };

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        clearErrors();
        languageInput.value = languageSelect.value;
        document.body.classList.add('is-loading');
        overlay.classList.add('is-visible');
        loadingState.currentStep = 0;
        loadingState.stepStartedAt = Date.now();
        loadingState.displayedPercent = 4;
        loadingState.done = false;
        startProgressTicker();
        showLoadingProgress(0, false);

        const formData = new FormData(form);

        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
              'X-Requested-With': 'XMLHttpRequest',
            },
          });

          const payload = await response.json();

          if (!response.ok) {
            stopProgressTicker();
            document.body.classList.remove('is-loading');
            overlay.classList.remove('is-visible');
            if (payload.errors) {
              if (payload.errors.backend) {
                errorFields.x_url.textContent = payload.errors.backend;
              }
              Object.entries(payload.errors).forEach(([field, message]) => {
                if (errorFields[field]) {
                  errorFields[field].textContent = message;
                }
              });
            }
            return;
          }

          showLoadingProgress(payload.current_step ?? 0, false);
          await pollProgress(payload.status_url);
        } catch (error) {
          stopProgressTicker();
          document.body.classList.remove('is-loading');
          overlay.classList.remove('is-visible');
          errorFields.x_url.textContent = error.message || 'Unable to complete the analysis.';
        }
      });
    </script>
  </body>
</html>
